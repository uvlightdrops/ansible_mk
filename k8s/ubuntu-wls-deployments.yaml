apiVersion: v1
kind: Namespace
metadata:
  name: weblogic
---
# PersistentVolumeClaim for domain data (uses existing storageClass 'manual')
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-weblogic-home
  namespace: weblogic
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: manual
---
# Admin Server (single pod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wls-admin
  namespace: weblogic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wls-admin
  template:
    metadata:
      labels:
        app: wls-admin
    spec:
      volumes:
      - name: ssh-keys
        emptyDir: {}
      - name: domain-home
        persistentVolumeClaim:
          claimName: pvc-weblogic-home
      - name: gen-ssh-keys-script
        configMap:
          name: gen-ssh-keys-script
      - name: gen-ssh-keys-script
        configMap:
          name: gen-ssh-keys-script

      initContainers:
      - name: gen-ssh-keys
        image: wls-dev:1.3
        command:
          - /bin/sh
          - -c
          - /scripts/gen-ssh-keys.sh
        volumeMounts:
          - name: ssh-keys
            mountPath: /etc/ssh
          - name: gen-ssh-keys-script
            mountPath: /scripts
            readOnly: true

      containers:
      - name: wls-admin
        image: wls-dev:1.3
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1000
        ports:
        - containerPort: 22
        volumeMounts:
        - name: ssh-keys
          mountPath: /etc/ssh
        - name: domain-home
          mountPath: /u01/domains
---
# Managed Server 1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wls-managed-1
  namespace: weblogic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wls-managed-1
  template:
    metadata:
      labels:
        app: wls-managed-1
    spec:
      volumes:
      - name: ssh-keys
        emptyDir: {}
      - name: domain-home
        persistentVolumeClaim:
          claimName: pvc-weblogic-home

      initContainers:
      - name: gen-ssh-keys
        image: wls-dev:1.3
        command:
          - /bin/sh
          - -c
          - /scripts/gen-ssh-keys.sh
        volumeMounts:
          - name: ssh-keys
            mountPath: /etc/ssh
          - name: gen-ssh-keys-script
            mountPath: /scripts
            readOnly: true

      containers:
      - name: wls-managed
        image: wls-dev:1.3
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1000
        ports:
        - containerPort: 22
        volumeMounts:
        - name: ssh-keys
          mountPath: /etc/ssh
        - name: domain-home
          mountPath: /u01/domains
---
# Managed Server 2
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wls-managed-2
  namespace: weblogic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wls-managed-2
  template:
    metadata:
      labels:
        app: wls-managed-2
    spec:
      volumes:
      - name: ssh-keys
        emptyDir: {}
      - name: domain-home
        persistentVolumeClaim:
          claimName: pvc-weblogic-home

      initContainers:
      - name: gen-ssh-keys
        image: wls-dev:1.3
        command:
          - /bin/sh
          - -c
          - |
            if [ ! -f /etc/ssh/sshd_config ]; then
              cp -a /etc/ssh.orig/* /etc/ssh || true
            fi
            ssh-keygen -A || true
            chown -R 1000:1000 /etc/ssh || true
            find /etc/ssh -type f -exec chmod 600 {} \; || true
        volumeMounts:
          - name: ssh-keys
            mountPath: /etc/ssh

      containers:
      - name: wls-managed
        image: wls-dev:1.3
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1000
        ports:
        - containerPort: 22
        volumeMounts:
        - name: ssh-keys
          mountPath: /etc/ssh
        - name: domain-home
          mountPath: /u01/domains
---
# Simple DB (PostgreSQL) for tests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-db
  namespace: weblogic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-db
  template:
    metadata:
      labels:
        app: test-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: weblogic
        - name: POSTGRES_PASSWORD
          value: weblogic
        - name: POSTGRES_DB
          value: fmw
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pgdata
        emptyDir: {}
---
# Services
apiVersion: v1
kind: Service
metadata:
  name: wls-admin-ssh
  namespace: weblogic
spec:
  selector:
    app: wls-admin
  ports:
  - port: 22
    targetPort: 22
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: wls-managed-1-ssh
  namespace: weblogic
spec:
  selector:
    app: wls-managed-1
  ports:
  - port: 22
    targetPort: 22
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: wls-managed-2-ssh
  namespace: weblogic
spec:
  selector:
    app: wls-managed-2
  ports:
  - port: 22
    targetPort: 22
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: test-db
  namespace: weblogic
spec:
  selector:
    app: test-db
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

