apiVersion: apps/v1
kind: Deployment
metadata:
  name: wls-dev
  namespace: weblogic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wls-dev
  template:
    metadata:
      labels:
        app: wls-dev
    spec:
      volumes:
      - name: ssh-keys
        emptyDir: {}
      - name: home
        emptyDir: {}
      - name: gen-ssh-keys-script
        configMap:
          name: gen-ssh-keys-script
          defaultMode: 0755

      initContainers:
      - name: gen-ssh-keys
        image: wls-dev:1.3
        command:
          - /bin/sh
          - -c
          - /scripts/gen-ssh-keys.sh
        volumeMounts:
          - name: ssh-keys
            mountPath: /etc/ssh
          - name: gen-ssh-keys-script
            mountPath: /scripts
            readOnly: true

      containers:
      - name: wls
        image: wls-dev:1.3
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1000
        ports:
        - containerPort: 22
        volumeMounts:
        - name: ssh-keys
          mountPath: /etc/ssh
        - name: home
          mountPath: /home/weblogic
---
apiVersion: v1
kind: Service
metadata:
  name: wls-dev-ssh
  namespace: weblogic
spec:
  selector:
    app: wls-dev
  ports:
  - protocol: TCP
    port: 22
    targetPort: 22
  type: ClusterIP

