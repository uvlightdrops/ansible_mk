apiVersion: v1
kind: Service
metadata:
  name: wls-admin-ssh-nodeport
  namespace: weblogic
spec:
  selector:
    app: wls-admin
  ports:
  - port: 22
    targetPort: 22
    nodePort: 30222
    protocol: TCP
  type: NodePort
